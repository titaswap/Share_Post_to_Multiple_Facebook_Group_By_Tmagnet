<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="popup.css">
</head>
<body>
  <div class="wrapper">
    <h2>Generate AI Content</h2>
    <p>Enter a prompt to generate content for the form on this page.</p>
    <textarea id="generate-content-prompt" placeholder="e.g., Write a blog post about the benefits of AI in marketing."></textarea>
    <div class="button-group">
      <button id="generate-content-button" class="primary">Generate</button>
      <button id="back-to-main-button" class="secondary">Back</button>
    </div>
    <div id="generate-content-status" class="status hidden"></div>
  </div>
</body>
</html>
